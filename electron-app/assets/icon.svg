<?xml version="1.0" encoding="UTF-8"?>
<!-- Opcao 3: Board tatico com texto TactiPlan abaixo -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg3)" rx="96"/>

  <!-- Tactical board (more compact, top) -->
  <g transform="translate(56, 50)">
    <!-- Board frame -->
    <rect width="400" height="264" rx="14" fill="none" stroke="white" stroke-width="10"/>

    <!-- Halfway line -->
    <line x1="200" y1="0" x2="200" y2="264" stroke="white" stroke-width="6"/>
    <!-- Center circle -->
    <circle cx="200" cy="132" r="40" fill="none" stroke="white" stroke-width="6"/>
    <circle cx="200" cy="132" r="5" fill="white"/>
    <!-- Penalty areas -->
    <rect x="0" y="70" width="50" height="124" fill="none" stroke="white" stroke-width="6"/>
    <rect x="350" y="70" width="50" height="124" fill="none" stroke="white" stroke-width="6"/>
    <!-- Goal areas -->
    <rect x="0" y="100" width="20" height="64" fill="none" stroke="white" stroke-width="5"/>
    <rect x="380" y="100" width="20" height="64" fill="none" stroke="white" stroke-width="5"/>

    <!-- Tactical marks -->
    <g stroke="white" stroke-width="7" stroke-linecap="round">
      <!-- Xs -->
      <line x1="82" y1="88" x2="112" y2="118"/>
      <line x1="112" y1="88" x2="82" y2="118"/>
      <line x1="146" y1="190" x2="176" y2="220"/>
      <line x1="176" y1="190" x2="146" y2="220"/>
    </g>

    <!-- Os -->
    <g fill="none" stroke="white" stroke-width="7">
      <circle cx="246" cy="60" r="17"/>
      <circle cx="94" cy="202" r="17"/>
      <circle cx="286" cy="216" r="17"/>
    </g>

    <!-- Arrow -->
    <path d="M 120 172 Q 194 130 236 72"
          fill="none" stroke="#fbbf24" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 222 64 L 252 60 L 246 86 Z" fill="#fbbf24"/>
  </g>

  <!-- Tripod stand -->
  <g stroke="white" stroke-width="8" stroke-linecap="round" fill="white">
    <rect x="248" y="314" width="16" height="18" rx="3"/>
    <line x1="256" y1="332" x2="210" y2="376"/>
    <line x1="256" y1="332" x2="256" y2="378"/>
    <line x1="256" y1="332" x2="302" y2="376"/>
  </g>

  <!-- Text "TactiPlan" below -->
  <text x="256" y="450"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800"
        font-size="64"
        fill="white"
        letter-spacing="-2">TactiPlan</text>

  <!-- Accent dot line -->
  <g fill="#fbbf24">
    <circle cx="220" cy="474" r="3"/>
    <circle cx="240" cy="474" r="3"/>
    <circle cx="260" cy="474" r="3"/>
    <circle cx="280" cy="474" r="3"/>
    <circle cx="300" cy="474" r="3"/>
  </g>
</svg>
