<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>

  <!-- Tactical field (subtle background) -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="4" fill="none">
    <rect x="56" y="96" width="400" height="320" rx="12"/>
    <line x1="256" y1="96" x2="256" y2="416"/>
    <circle cx="256" cy="256" r="56"/>
  </g>

  <!-- Tactical movement arrow (subtle) -->
  <g opacity="0.35">
    <path d="M 100 360 Q 200 260 340 180"
          fill="none"
          stroke="#fbbf24"
          stroke-width="10"
          stroke-linecap="round"/>
    <path d="M 322 168 L 358 176 L 344 210 Z" fill="#fbbf24"/>
  </g>

  <!-- Player dots (subtle accent) -->
  <g opacity="0.5">
    <circle cx="100" cy="360" r="14" fill="#ffffff"/>
    <circle cx="340" cy="180" r="14" fill="#ffffff"/>
    <circle cx="400" cy="340" r="12" fill="#ef4444"/>
    <circle cx="140" cy="160" r="12" fill="#ef4444"/>
  </g>

  <!-- TP main text (dominant) -->
  <text x="256" y="310"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="900"
        font-size="240"
        fill="white"
        letter-spacing="-8"
        style="paint-order: stroke; stroke: rgba(0,0,0,0.15); stroke-width: 4;">TP</text>

  <!-- Accent bar under TP -->
  <rect x="176" y="356" width="160" height="8" fill="#fbbf24" rx="4"/>
</svg>
