# =========================================
# Landing Page - tactiplan.faggin.com.br
# =========================================
server {
    server_name tactiplan.faggin.com.br;

    # Installer downloads
    location /downloads/ {
        alias /root/sports-platform/landing/downloads/;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=3600";
    }

    # Landing page (root)
    location / {
        root /root/sports-platform/landing;
        try_files $uri $uri/ /index.html;
        # No caching for HTML to force updates
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tactiplan.faggin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tactiplan.faggin.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# =========================================
# App - app.tactiplan.faggin.com.br
# =========================================
server {
    server_name app.tactiplan.faggin.com.br;

    # API proxy (backend Node.js)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50M;
    }

    # Upload files (user-submitted)
    location /uploads/ {
        alias /root/sports-platform/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React App at root
    location / {
        root /root/sports-platform/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/tactiplan.faggin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tactiplan.faggin.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# =========================================
# HTTP -> HTTPS redirect
# =========================================
server {
    listen 80;
    server_name tactiplan.faggin.com.br app.tactiplan.faggin.com.br;
    return 301 https://$host$request_uri;
}
