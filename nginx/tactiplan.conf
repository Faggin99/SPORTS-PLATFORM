server {
    listen 80;
    server_name tactiplan.faggin.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tactiplan.faggin.com.br;

    ssl_certificate /etc/letsencrypt/live/tactiplan.faggin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tactiplan.faggin.com.br/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend (React SPA)
    root /root/sports-platform/frontend/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload limit (50MB)
        client_max_body_size 50M;
    }

    # Serve uploads statically
    location /uploads/ {
        alias /root/sports-platform/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static asset cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
