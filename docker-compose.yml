version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sports_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_platform
      POSTGRES_USER: sports_admin
      POSTGRES_PASSWORD: sports_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sports_network

  redis:
    image: redis:7-alpine
    container_name: sports_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sports_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sports_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sports_network

volumes:
  postgres_data:
  redis_data:

networks:
  sports_network:
    driver: bridge